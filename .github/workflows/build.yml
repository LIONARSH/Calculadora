name: Build APK

on:
  push:
    branches:
      - main

  workflow_dispatch:


jobs:

  build:

    runs-on: ubuntu-22.04


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"


      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"


      - name: Install Android SDK
        uses: android-actions/setup-android@v3


      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses

          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"


      - name: Install Linux packages
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            zip \
            unzip \
            autoconf \
            automake \
            libtool \
            pkg-config \
            cmake \
            ninja-build \
            build-essential \
            libssl-dev \
            libffi-dev \
            libsqlite3-dev \
            zlib1g-dev \
            libjpeg-dev \
            libpng-dev


      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip

          pip install setuptools wheel

          pip install Cython==0.29.36

          pip install buildozer==1.5.0


      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle

          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

          restore-keys: |
            buildozer-${{ runner.os }}-


      - name: Clean build
        run: |
          rm -rf .buildozer
          rm -rf bin


      - name: Build APK
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_NDK_HOME: /home/runner/.buildozer/android/platform/android-ndk-r25b

        run: |
          buildozer -v android debug 2>&1 | tee build.log


      - name: Find APK
        if: always()
        run: |
          echo "APK encontrados:"
          find . -name "*.apk"


      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: |
            bin/*.apk
          if-no-files-found: error


      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
