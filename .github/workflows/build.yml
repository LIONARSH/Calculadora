name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libncurses5:i386 \
            libstdc++6:i386 libz1:i386 libssl-dev libffi-dev libsqlite3-dev \
            tk-dev libgdbm-dev libgdbm-compat-dev libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev cmake

      - name: Install Buildozer and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install buildozer cython

      - name: Build with Buildozer
        run: |
          # El 'yes' al principio confirma automáticamente las licencias del SDK
          yes | buildozer android debug
        env:
          # Nivel 2 muestra errores detallados si el proceso falla
          BUILDOZER_LOG_LEVEL: 2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
